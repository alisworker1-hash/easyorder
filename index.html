<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EasyOrder — your friendly shopping helper</title>
  <meta name="description" content="A calm, simple way to shop for home essentials. Just talk to your helper — it finds things, shows the real price, and orders for you. Made to be easy for everyone." />
  <meta name="theme-color" content="#10996f" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><circle cx='12' cy='12' r='11' fill='%2310996f'/><path fill='%23fff' d='M7 17.5c-.8 0-1.5.7-1.5 1.5S6.2 20.5 7 20.5 8.5 19.8 8.5 19 7.8 17.5 7 17.5zm8 0c-.8 0-1.5.7-1.5 1.5s.7 1.5 1.5 1.5 1.5-.7 1.5-1.5-.7-1.5-1.5-1.5zM6 5l1.2 2.5h7.2c.5 0 1-.3 1.2-.8l1.6-3.3H6.4L5.8 2H3.5v1.5h1.4z'/></svg>" type="image/svg+xml" />
  <meta property="og:title" content="EasyOrder — your friendly shopping helper" />
  <meta property="og:description" content="Just talk to your helper — it finds things, shows the real price, and orders for you. Made to be easy for everyone." />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=7" />
</head>
<body>
  <a class="skip-link" href="#chatInput">Skip to the chat box</a>
  <div id="live" class="sr-only" aria-live="polite" aria-atomic="true"></div>

  <header class="topbar">
    <a class="brand" href="#" aria-label="EasyOrder home">
      <span class="brand-dot" aria-hidden="true">🛒</span>
      <span class="brand-name">Easy<span>Order</span></span>
    </a>
    <div class="topbar-tools">
      <div class="textsize" role="group" aria-label="Text size">
        <span class="textsize-label" aria-hidden="true">Text&nbsp;size</span>
        <button class="ts-btn" data-size="base" aria-pressed="true" title="Normal text">A</button>
        <button class="ts-btn ts-mid" data-size="large" aria-pressed="false" title="Larger text">A</button>
        <button class="ts-btn ts-big" data-size="xlarge" aria-pressed="false" title="Largest text">A</button>
      </div>
      <button class="pill-btn" id="browseOpen" aria-haspopup="dialog">
        <span aria-hidden="true">🧺</span> <span class="pill-text">Browse</span>
      </button>
      <button class="pill-btn cart-pill" id="cartOpen" aria-haspopup="dialog" aria-label="Open your cart">
        <span aria-hidden="true">🛍️</span> <span class="pill-text">Cart</span>
        <span class="cart-count" id="cartCount" aria-hidden="true">0</span>
      </button>
    </div>
  </header>

  <!-- The whole page is the conversation -->
  <main class="stage">
    <div class="chat-col">
      <div class="chat-scroll" id="chatScroll">
        <section class="welcome" id="welcome">
          <div class="welcome-avatar" aria-hidden="true">🛒</div>
          <h1>Hi — how can I help today?</h1>
          <p>Just tell me what you need in your own words. I'll find it, show you the real price, and pop it in your cart whenever you're ready. No rush, no pressure.</p>
          <div class="welcome-trust">
            <span class="trust-item"><span aria-hidden="true">✓</span> Real&nbsp;prices</span>
            <span class="trust-item"><span aria-hidden="true">🔔</span> Reminders</span>
            <span class="trust-item"><span aria-hidden="true">🍏</span> Apple&nbsp;Pay</span>
          </div>
        </section>
        <div class="chat-messages" id="chatMessages" aria-live="polite"></div>
      </div>

      <div class="composer">
        <div class="suggest" id="chatSuggestions"></div>
        <form class="composer-bar" id="chatForm" autocomplete="off">
          <label for="chatInput" class="sr-only">Type your message</label>
          <input id="chatInput" type="text" placeholder="Type here, like “I need milk and bread”…" />
          <button class="send" type="submit" aria-label="Send message">
            <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true"><path fill="currentColor" d="M12 4l-1.4 1.4L16.2 11H4v2h12.2l-5.6 5.6L12 20l8-8z" transform="rotate(-90 12 12)"/></svg>
          </button>
        </form>
        <p class="composer-note" id="chatNote"></p>
      </div>
    </div>
  </main>

  <!-- Browse overlay (opt-in) -->
  <div class="overlay-backdrop" id="browseBackdrop" hidden></div>
  <section class="browse" id="browseView" role="dialog" aria-modal="true" aria-labelledby="browseTitle" hidden>
    <div class="browse-head">
      <h2 id="browseTitle">Browse items</h2>
      <button class="icon-btn" id="browseClose" aria-label="Close browse">✕</button>
    </div>
    <div class="browse-body">
      <div class="search-wrap">
        <label for="searchInput" class="sr-only">Search products</label>
        <span class="search-ico" aria-hidden="true">🔍</span>
        <input type="search" id="searchInput" class="search-input" placeholder="Search for milk, soap, vitamins…" autocomplete="off" />
      </div>
      <nav class="categories" id="categories" aria-label="Shop by category"></nav>
      <p class="results-note" id="resultsNote" role="status"></p>
      <div class="grid" id="grid"></div>
    </div>
  </section>

  <!-- Cart drawer -->
  <div class="drawer-backdrop" id="drawerBackdrop" hidden></div>
  <aside class="cart-drawer" id="cartDrawer" role="dialog" aria-modal="true" aria-labelledby="cartTitle" hidden>
    <div class="drawer-head">
      <h2 id="cartTitle">Your cart</h2>
      <button class="icon-btn" id="cartClose" aria-label="Close cart">✕</button>
    </div>
    <div class="drawer-body" id="cartBody"></div>
    <div class="drawer-foot" id="cartFoot"></div>
  </aside>

  <!-- Confirmation / receipt modal -->
  <div class="modal-backdrop" id="modal" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button class="modal-close" id="modalClose" aria-label="Close">✕</button>
      <div id="modalBody"></div>
    </div>
  </div>

  <span id="footNote" class="sr-only"></span>

  <script src="vendor/confetti.min.js?v=1"></script>
  <script src="app.js?v=8"></script>
  <script src="assistant.js?v=7"></script>
</body>
</html>
