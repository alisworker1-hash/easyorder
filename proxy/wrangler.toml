name = "easyorder-ai"
main = "worker.js"
compatibility_date = "2024-11-01"

# Provider config — these are the exact values we verified live on OpenRouter.
[vars]
LLM_ENDPOINT = "https://openrouter.ai/api/v1/chat/completions"
LLM_MODEL = "meta-llama/llama-3.3-70b-instruct"

# The API key is a SECRET, never a var. Set it once (paste your OpenRouter sk-or-v1-… key):
#   wrangler secret put LLM_API_KEY
#
# To use Fireworks instead: delete the [vars] block above (the worker then defaults to
# Fireworks) and put your Fireworks key in the same LLM_API_KEY secret.
